<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Global Nowcast — REFC Radar Composite</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e14'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%2302fd02'/%3E%3Ccircle cx='16' cy='16' r='8' fill='none' stroke='%23019ff4' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='12' fill='none' stroke='%2304e9e7' stroke-width='1.5' opacity='.6'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <header id="topbar">
    <div class="brand">Global Nowcast <span>REFC composite</span></div>
    <div class="meta">
      <span id="valid-time">—</span>
      <span id="cycle-info" class="dim">—</span>
    </div>
  </header>

  <div id="panel">
    <div class="products">
      <button data-product="rapid" class="active">Rapid · 18h</button>
      <button data-product="extended">Extended · 48h</button>
    </div>

    <div class="controls">
      <button id="play" title="Play/Pause">▶</button>
      <button id="step-back" title="Step back">⏮</button>
      <button id="step-fwd" title="Step forward">⏭</button>
      <input type="range" id="scrub" min="0" max="0" value="0">
    </div>

    <div class="row">
      <label>Opacity</label>
      <input type="range" id="opacity" min="20" max="100" value="80">
    </div>

    <div class="row legend">
      <label>dBZ</label>
      <div id="legend-bar"></div>
      <div class="legend-scale"><span>5</span><span>35</span><span>75</span></div>
    </div>
  </div>

  <div id="status">loading…</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
