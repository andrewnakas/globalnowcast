name: Global Nowcast

on:
  schedule:
    - cron: "10 * * * *"   # hourly, ~10 min past (lets the fresh cycle settle)
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "pipeline/**"
      - "site/**"
      - ".github/workflows/nowcast.yml"
      - "requirements.txt"

concurrency:
  group: nowcast
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build forecast frames
        run: python pipeline/main.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
